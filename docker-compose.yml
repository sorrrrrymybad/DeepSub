services:
  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    image: deepsub-backend:latest
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - ./data:/app/data
      - /volume2/media:/media
    depends_on:
      - redis

  worker:
    build: ./backend
    image: deepsub-backend:latest
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: python start_worker.py
    env_file: .env
    volumes:
      - ./data:/app/data
      - /volume2/media:/media
    depends_on:
      - redis

  frontend:
    build: ./frontend
    image: deepsub-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    # 宿主端口由 .env 中 FRONTEND_PORT 决定；容器内 nginx 始终监听 80
    depends_on:
      - backend

volumes:
  redis_data:
